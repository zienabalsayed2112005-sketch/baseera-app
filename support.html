<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بصيرة - المساعد الذكي المطور</title>
    <style>
        :root {
            /* Palette: Mocha & Beige - الهوية البصرية المفضلة لزينب */
            --deep-brown: #433129;
            --mocha-accent: #8c6d5e;
            --beige-bg: #f3f0e7;
            --white: #ffffff;
        }

        body {
            background: var(--deep-brown);
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden;
        }

        .main-assistant-btn {
            width: 280px;
            height: 280px;
            background: var(--mocha-accent);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--white);
            font-size: 24px;
            cursor: pointer;
            border: 12px solid var(--beige-bg);
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            text-align: center;
            transition: 0.3s;
            z-index: 100;
        }

        .pulse { animation: pulse-animation 2s infinite; }

        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0 rgba(243, 240, 231, 0.7); }
            70% { box-shadow: 0 0 0 40px rgba(243, 240, 231, 0); }
            100% { box-shadow: 0 0 0 0 rgba(243, 240, 231, 0); }
        }

        .info-panel {
            position: fixed;
            bottom: 30px;
            background: var(--beige-bg);
            width: 85%;
            max-width: 600px;
            border-radius: 25px;
            padding: 25px;
            display: none;
            text-align: center;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.4);
            border: 2px solid var(--mocha-accent);
        }

        .status-text { color: var(--deep-brown); font-weight: bold; font-size: 20px; margin-bottom: 10px; }
        .transcript-text { color: #666; font-style: italic; font-size: 16px; margin-bottom: 5px; }
        .ai-response { color: var(--mocha-accent); font-size: 18px; font-weight: 600; }

        .back-home-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--mocha-accent);
            color: var(--white);
            border: 4px solid var(--beige-bg);
            border-radius: 30px;
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 1000;
        }
    </style>
</head>

<body onclick="startBaseera()">

    <div id="bigBtn" class="main-assistant-btn pulse">
        <span style="font-size: 90px;">🎧</span>
        <br>
        اضغط للتحدث <br> مع بصيرة
    </div>

    <div id="infoPanel" class="info-panel">
        <div id="status" class="status-text">أنا أسمعك الآن...</div>
        <div id="user-said" class="transcript-text"></div>
        <div id="ai-reply" class="ai-response"></div>
    </div>

    <button class="back-home-btn" onclick="window.location.href='home.html'">
        🏠 الرجوع للرئيسية
    </button>

<script>
const synth = window.speechSynthesis;
let isStarted = false;

// 🧠 عقل بصيرة المحدث بالكامل بناءً على طلبات زينب الأخيرة
const baseeraBrain = [
    {
        keywords: ["رادار", "كاميرا", "تعرف"],
        reply: "أيقونة الرادار هي عينك الذكية؛ تستخدم الكاميرا للتعرف على الأشياء، الألوان، وتحليل مشاعر الأشخاص."
    },
    {
        keywords: ["منبه", "ساعة", "موعد"],
        reply: "المنبه يساعدك في تنظيم يومك وتنبيهك صوتياً بمواعيدك ومهامك الهامة."
    },
    {
        /* التعديل الأول: أيقونة القرآن */
        keywords: ["قرآن", "استماع", "الكهف", "يوسف", "حفظ"],
        reply: "أيقونة القرآن الكريم هي مساحتك الروحانية؛ يمكنك من خلالها الاستماع إلى السور المختارة مثل الكهف ويوسف بصوت القارئ أحمد عبد الفتاح، وتساعدك في وردك اليومي."
    },
    {
        keywords: ["هدوء", "استرخاء", "راحة"],
        reply: "أيقونة الهدوء توفر لك أصواتاً مريحة وتمارين للتنفس لتساعدك على الاسترخاء وتقليل التوتر."
    },
    {
        keywords: ["أكاديمية", "تعليم", "دروس"],
        reply: "الأكاديمية هي مساحتك التعليمية، تحتوي على مصادر وكتب لدعم مسيرتك الدراسية."
    },
    {
        keywords: ["استغاثة", "طوارئ", "نجدة"],
        reply: "نظام الاستغاثة مخصص للحالات الطارئة؛ حيث يرسل تنبيهات فورية لطلب المساعدة عند الحاجة."
    },
    {
        /* التعديل الثاني: منسق الملابس بناءً على طلبك */
        keywords: ["منسق", "ملابس", "لبس", "الوان", "تنسيق"],
        reply: "منسق الملابس يساعدك في التعرف على ألوان قطع ملابسك، ويقترح عليك أفضل الألوان التي تتماشى معها لتظهر بأفضل إطلالة."
    },
    {
        keywords: ["أفق", "استكشاف", "بحث"],
        reply: "أيقونة الأفق تفتح لك آفاقاً جديدة للاستكشاف والبحث عن كل ما هو جديد."
    },
    {
        keywords: ["تباين", "ألوان", "رؤية"],
        reply: "أيقونة التباين تتيح لك تغيير ألوان الموقع لتناسب بصرك وتوفر لك أقصى درجات الراحة."
    },
    {
        keywords: ["ملهمون", "قصص", "نجاح"],
        reply: "في أيقونة ملهمون، ستتعرف على قصص أشخاص تحدوا الصعاب وحققوا المستحيل لتستلهم منهم قوتك."
    },
    {
        keywords: ["فريق", "بناة", "مطورين"],
        reply: "أيقونة الفريق تعرفك على المبدعين الذين قاموا ببناء وتصميم موقع بصيرة لخدمتك."
    },
    {
        keywords: ["دعم", "مساعدة", "أسئلة"],
        reply: "أنت الآن في أيقونة الدعم، أنا هنا للإجابة على كل استفساراتك حول كيفية استخدام بَصيرة."
    }
];

function say(text) {
    synth.cancel();
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "ar-SA";
    msg.rate = 1.0; 
    synth.speak(msg);
}

function startBaseera() {
    if (!isStarted) {
        say("أهلاً بك في نظام بَصيرة. يمكنك سؤالي عن أي أيقونة مثل الرادار، الأفق، الهدوء، الأكاديمية أو نظام الاستغاثة. أنا معك الآن.");
        document.getElementById('infoPanel').style.display = "block";
        isStarted = true;
        return;
    }
    talkToAI();
}

function talkToAI() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        alert("المتصفح لا يدعم التعرف على الصوت");
        return;
    }

    const recognition = new SpeechRecognition();
    recognition.lang = "ar-SA";
    
    recognition.onstart = () => {
        document.getElementById('status').innerText = "🎤 أنا أسمعك...";
        document.getElementById('bigBtn').style.background = "#A52A2A";
    };

    recognition.onresult = (e) => {
        const query = e.results[0][0].transcript.toLowerCase();
        document.getElementById('user-said').innerText = "أنت قلت: " + query;
        
        const found = baseeraBrain.find(item => 
            item.keywords.some(key => query.includes(key))
        );

        let reply = found ? found.reply : "بخصوص " + query + "، يمكنك سؤالي عن الأيقونات الموجودة مثل منسق الملابس، الفريق، أو الأكاديمية.";

        document.getElementById('ai-reply').innerText = "بصيرة: " + reply;
        document.getElementById('status').innerText = "تمت الإجابة ✅";
        say(reply);
    };

    recognition.onend = () => {
        document.getElementById('bigBtn').style.background = "#8c6d5e";
    };

    recognition.start();
}
</script>
</body>
</html>
