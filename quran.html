<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سورة الكهف | بَصيرة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* لوحة ألوان مستوحاة من ذوق زينب: درجات البني الموكا والبيج الدافئ */
            --deep-brown: #2D1B15; 
            --gold-accent: #C5A059;
            --beige-light: #F5EFE6;
            --glass-bg: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }

        body {
            /* الخلفية بني داكن مع تدرج خفيف للفخامة */
            background: radial-gradient(circle at center, #3E2723 0%, #1A0F0B 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--beige-light);
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            text-align: center;
        }

        /* تنسيق اسم السورة بشكل شيك */
        .surah-header {
            margin-bottom: 40px;
        }

        .surah-header h1 {
            font-size: 2.8rem;
            font-weight: 700;
            color: var(--gold-accent);
            letter-spacing: 2px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .surah-header p {
            font-size: 1.1rem;
            opacity: 0.8;
            font-weight: 300;
            margin-top: 5px;
        }

        /* كارت المشغل بتصميم Minimalist بروفيشنال */
        .player-wrapper {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(197, 160, 89, 0.2);
            border-radius: 50px;
            padding: 60px 30px;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }

        .player-wrapper:hover {
            transform: scale(1.02);
            border-color: var(--gold-accent);
            box-shadow: 0 40px 80px rgba(0,0,0,0.5);
        }

        /* أيقونة المصحف بشكل جمالي */
        .quran-icon-wrap {
            width: 100px;
            height: 100px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #C5A059 0%, #8D6E63 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .status-msg {
            font-size: 1.6rem;
            font-weight: 400;
            color: var(--beige-light);
        }

        .back-link {
            margin-top: 50px;
            display: inline-block;
            text-decoration: none;
            color: var(--gold-accent);
            font-size: 1rem;
            padding: 10px 30px;
            border: 1px solid var(--gold-accent);
            border-radius: 30px;
            transition: 0.3s;
        }

        .back-link:hover {
            background: var(--gold-accent);
            color: var(--deep-brown);
        }

        /* أنيميشن ناعم للتشغيل */
        .is-playing {
            border-color: var(--gold-accent);
            background: rgba(197, 160, 89, 0.05);
        }

        .pulse-animation {
            animation: softPulse 2s infinite ease-in-out;
        }

        @keyframes softPulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body onload="initApp()">

    <div class="container">
        <header class="surah-header">
            <h1>سورة الكهف</h1>
            <p>بصوت القارئ أحمد عبد الفتاح</p>
        </header>

        <div class="player-wrapper" id="mainButton" onclick="handleToggle()">
            <div class="quran-icon-wrap" id="iconBox">📖</div>
            <h2 id="statusLabel" class="status-msg">اضغط للاستماع</h2>
        </div>

        <audio id="audioSource" src="audio/alkahf.mp3"></audio>

        <a href="home.html" class="back-link">العودة للرئيسية</a>
    </div>

    <script>
        const audio = document.getElementById('audioSource');
        const statusLabel = document.getElementById('statusLabel');
        const mainButton = document.getElementById('mainButton');
        const iconBox = document.getElementById('iconBox');
        let playingState = false;

        function speak(msg) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(msg);
            utterance.lang = 'ar-EG';
            utterance.rate = 0.85;
            window.speechSynthesis.speak(utterance);
        }

        function initApp() {
            // التوجيه الصوتي عند فتح الصفحة
            speak("أنتِ الآن في صفحة القرآن. اضغطي في منتصف الشاشة لتشغيل سورة الكهف بصوت الشيخ أحمد عبد الفتاح");
        }

        function handleToggle() {
            if (!playingState) {
                audio.play().then(() => {
                    playingState = true;
                    statusLabel.innerText = "جاري التلاوة...";
                    mainButton.classList.add('is-playing');
                    iconBox.classList.add('pulse-animation');
                    speak("جاري تشغيل سورة الكهف بصوت الشيخ أحمد عبد الفتاح");
                }).catch(() => {
                    speak("عذراً، تأكدي من وجود الملف في مجلد أوديو باسم الكهف دوت إم بي ثري");
                });
            } else {
                audio.pause();
                playingState = false;
                statusLabel.innerText = "اضغط للاستماع";
                mainButton.classList.remove('is-playing');
                iconBox.classList.remove('pulse-animation');
                speak("تم إيقاف التلاوة");
            }
        }
    </script>
</body>
</html>
