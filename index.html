<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بَصيرة | الرؤية بقلبٍ آخر</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-brown: #3C2B22; /* نفس درجة الخلفية في الصورة */
            --glass-card: rgba(255, 255, 255, 0.05); /* كارت شفاف جداً */
            --gold: #C69774; /* لون الذهب المطفي */
            --white: #F5EFE6; 
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        
        body { 
            background-color: var(--bg-brown); 
            height: 100vh; display: flex; align-items: center; justify-content: center; 
            overflow: hidden;
        }

        /* الكارت بنفس أبعاد وشكل الصورة */
        .main-card {
            background-color: var(--glass-card);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            width: 320px;
            height: 480px;
            border-radius: 60px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 40px 100px rgba(0,0,0,0.3);
            cursor: pointer;
        }

        /* النقط الستة مع أنيميشن تتابعي (Wave) */
        .braille-dots { display: flex; gap: 9px; position: absolute; top: 60px; }
        .dot { 
            width: 11px; height: 11px; 
            background: var(--gold); 
            border-radius: 50%; 
            opacity: 0.2;
            animation: brailleWave 2s infinite ease-in-out;
        }
        
        .dot:nth-child(1) { animation-delay: 0.0s; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        .dot:nth-child(4) { animation-delay: 0.6s; }
        .dot:nth-child(5) { animation-delay: 0.8s; }
        .dot:nth-child(6) { animation-delay: 1.0s; }

        @keyframes brailleWave {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); box-shadow: 0 0 10px var(--gold); }
        }

        /* المربع الذهبي الصغير */
        .logo-square {
            width: 55px; height: 28px;
            background: var(--gold);
            margin-bottom: 20px;
            border-radius: 2px;
            opacity: 0.8;
        }

        /* كلمة بصيرة بنفس حجم الصورة */
        .brand-name {
            font-size: 5.5rem;
            font-weight: 900;
            color: var(--white);
            line-height: 1;
            margin-bottom: 5px;
            text-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .slogan {
            font-size: 1.3rem;
            color: var(--gold);
            font-weight: 400;
            opacity: 0.9;
        }

        /* الخط الرفيع في الأسفل */
        .bottom-accent {
            width: 130px;
            height: 1.5px;
            background: var(--gold);
            position: absolute;
            bottom: 85px;
            opacity: 0.3;
        }

    </style>
</head>
<link rel="manifest" href="manifest.json">
<body onclick="enter()">

    <div class="main-card">
        <div class="braille-dots">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>

        <div class="logo-square"></div>
        
        <h1 class="brand-name">بَصيرة</h1>
        <p class="slogan">الرؤية بقلبٍ آخر</p>

        <div class="bottom-accent"></div>
    </div>

    <script>
        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ar-EG'; msg.rate = 1.3;
            window.speechSynthesis.speak(msg);
        }

       window.onload = () => {
    setTimeout(() => {
        speak("مرحباً بكِ في تطبيق بَصيرة. اضغطي للدخول.");
    }, 500);
};
        function enter() {
            speak("جاري الدخول");
            document.querySelector('.main-card').style.transition = '0.6s cubic-bezier(0.4, 0, 0.2, 1)';
            document.querySelector('.main-card').style.opacity = '0';
            document.querySelector('.main-card').style.transform = 'scale(0.95)';
            setTimeout(() => {
                window.location.href = "home.html"; 
            }, 600);
        }
    </script>
    <script>
    // التأكد من تطبيق التباين فور تحميل صفحة هوم
    window.addEventListener('DOMContentLoaded', () => {
        const savedMode = localStorage.getItem('baseeraTheme');
        if (savedMode) {
            const body = document.body;
            if (savedMode === 'dark') {
                body.style.backgroundColor = '#1a1a1a';
                body.style.color = '#fff';
            } else if (savedMode === 'high-vis') {
                body.style.backgroundColor = '#000';
                body.style.color = '#ff0';
            } else if (savedMode === 'soft-blue') {
                body.style.backgroundColor = '#e3f2fd';
                body.style.color = '#0d47a1';
            }
        }
    });
</script>
</body>
</html>
