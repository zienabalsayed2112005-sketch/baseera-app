<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بَصيرة | الرادار الذكي المطور</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --deep-brown: #1a0f0a; --dark-beige: #B59F7B; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { 
            height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden; background: radial-gradient(circle at center, #2D1B14 0%, var(--deep-brown) 100%);
        }
        .radar-box { position: relative; width: 320px; height: 320px; display: flex; align-items: center; justify-content: center; }
        #webcam { position: absolute; width: 90%; height: 90%; border-radius: 50%; object-fit: cover; border: 8px solid var(--dark-beige); z-index: 4; transform: scaleX(-1); }
        .ring { position: absolute; width: 100%; height: 100%; border: 2px solid var(--dark-beige); border-radius: 50%; animation: pulse 3s infinite linear; opacity: 0; }
        @keyframes pulse { 0% { transform: scale(0.9); opacity: 0.7; } 100% { transform: scale(1.5); opacity: 0; } }
        
        #status-display { margin-top: 20px; color: var(--dark-beige); font-weight: bold; text-align: center; font-size: 1.1rem; height: auto; min-height: 30px; }
        
        .main-btn { 
            margin-top: 20px; padding: 20px 45px; background: var(--dark-beige); color: var(--deep-brown); 
            border: none; border-radius: 50px; font-weight: 900; font-size: 1.6rem; 
            cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            z-index: 10;
        }

        .back-home { 
            margin-top: 40px; color: var(--dark-beige); text-decoration: none; 
            padding: 10px 25px; border: 2px solid var(--dark-beige); border-radius: 50px; 
            font-weight: bold; z-index: 10; transition: 0.3s;
        }
        .back-home:hover { background: var(--dark-beige); color: var(--deep-brown); }
    </style>
</head>
<body onclick="startRadar()">

    <div class="radar-box">
        <video id="webcam" autoplay playsinline muted></video>
        <div class="ring" style="animation-delay: 0s"></div>
        <div class="ring" style="animation-delay: 1.5s"></div>
    </div>

    <div id="status-display">اضغطي لتفعيل الرادار التلقائي</div>

    <!-- الزرار دلوقتى بقى بيشغل ويوقف التتبع التلقائي -->
    <button id="toggleBtn" class="main-btn">
        <i class="fas fa-play"></i> ابدأ الرصد التلقائي
    </button>

    <a href="home.html" class="back-home" onmouseenter="speak('زر العودة للصفحة الرئيسية')">
        <i class="fas fa-home"></i> العودة للرئيسية
    </a>

    <script>
        const video = document.getElementById('webcam');
        const status = document.getElementById('status-display');
        const toggleBtn = document.getElementById('toggleBtn');
        let model;
        let isActivated = false;
        let isScanning = false;
        let lastDetected = ""; // لمنع تكرار اسم الشيء الواحد بسرعة

        const labels = { 
            'handbag': 'شنطة', 'backpack': 'شنطة ظهر', 'suitcase': 'شنطة سفر',
            'laptop': 'لاب توب', 'chair': 'كرسي', 'table': 'طاولة', 
            'bottle': 'زجاجة مياه', 'cup': 'كوب', 'cell phone': 'موبايل', 
            'person': 'إنسان', 'mouse': 'فأرة', 'keyboard': 'لوحة مفاتيح',
            'clock': 'ساعه', 'book': 'كتاب', 'pen': 'قلم'
        };

        function speak(text) {
            if (window.speechSynthesis.speaking && text === lastDetected) return; 
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ar-SA';
            msg.rate = 1.0;
            window.speechSynthesis.speak(msg);
        }

        async function startRadar() {
            if (isActivated) return;
            isActivated = true;
            status.innerText = "جاري تحميل العين الذكية...";
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                model = await cocoSsd.load();
                status.innerText = "الرادار جاهز";
                speak("الرادار جاهز، اضغطي على زر ابدأ الرصد للتعرف التلقائي.");
                
                toggleBtn.onclick = (e) => {
                    e.stopPropagation();
                    isScanning = !isScanning;
                    if (isScanning) {
                        toggleBtn.innerHTML = '<i class="fas fa-pause"></i> إيقاف الرصد';
                        status.innerText = "الرصد التلقائي يعمل...";
                        runDetection();
                    } else {
                        toggleBtn.innerHTML = '<i class="fas fa-play"></i> ابدأ الرصد التلقائي';
                        status.innerText = "تم إيقاف الرصد";
                    }
                };
            } catch (err) {
                status.innerText = "خطأ في الكاميرا";
                speak("من فضلكِ اسمحي بالوصول للكاميرا.");
            }
        }

        async function runDetection() {
            if (!isScanning || !model) return;

            const predictions = await model.detect(video);
            
            // رفعنا الدقة لـ 65% عشان نضمن إنه "صح 100%" وميغلطش في الأشياء
            const bestPrediction = predictions.filter(p => p.score > 0.65)[0];

            if (bestPrediction) {
                const result = labels[bestPrediction.class] || bestPrediction.class;
                if (result !== lastDetected) {
                    speak(`أرى ${result}`);
                    status.innerText = `تم رصد: ${result}`;
                    lastDetected = result;
                    
                    // استراحة بسيطة عشان ميفضلش يكرر الاسم لو الحاجة لسة قدام الكاميرا
                    setTimeout(() => { lastDetected = ""; }, 3000);
                }
            }
            
            // استدعاء الدالة مرة تانية لعمل حلقة مستمرة
            requestAnimationFrame(runDetection);
        }
    </script>
</body>
</html>
