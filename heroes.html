<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملهمون | بَصيرة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --m: #3D2B1F; /* البني الأساسي لمشروع بصيرة */
            --c: #F5EFE6; /* البيج الهادئ */
            --g: #C69774; /* لون التحديد */
            --w: #fff; 
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--c); padding-bottom: 30px; }
        
        .nav { 
            background: var(--m); 
            padding: 20px 30px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            color: var(--c); 
            border-radius: 0 0 25px 25px;
        }

        .back-link { 
            color: var(--m); 
            text-decoration: none; 
            font-weight: 900; 
            background: var(--c); 
            padding: 8px 25px; 
            border-radius: 50px; 
            font-size: 0.9rem;
        }

        .container { padding: 15px; }
        .list { display: flex; flex-direction: column; gap: 15px; margin-top: 15px; }
        
        /* التنسيق القديم للكروت */
        .card { 
            background: var(--w); border-radius: 20px; padding: 15px; 
            display: flex; align-items: center; gap: 15px; 
            border-right: 8px solid var(--g); box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            cursor: pointer; transition: 0.2s;
        }
        
        .card:hover { transform: translateY(-3px); }

        .img-box { 
            width: 65px; height: 65px; background: var(--c); 
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; font-size: 30px; 
            border: 2px solid var(--m); flex-shrink: 0; 
        }
        
        .info h2 { color: var(--m); font-size: 1.2rem; }
        .info p { color: #777; font-size: 0.85rem; margin-top: 4px; }
    </style>
</head>
<body onload="welcome()">

    <div class="nav">
        <a href="home.html" class="back-link" onmouseenter="speak('العودة للرئيسية')">العودة للرئيسية</a>
        <h2>ملهمون</h2>
    </div>

    <div class="container">
        <div class="list" id="l"></div>
    </div>

<script>
        // القصص الطويلة والمفصلة
        const data = [
            ['طه حسين', '🖋', 'بدأتْ مأساةُ طه حسين وهو في الرابعةِ من عمرِهِ؛ حينَ أصيبَ برمدٍ بسيطٍ في عينيهِ؛ وبسببِ الجهلِ والفقرِ؛ عالجَهُ حلاقُ القريةِ بسائلٍ كيميائيٍّ خاطئٍ أطفأَ نورَ عينيهِ للأبدِ. عاشَ طفولةً قاسيةً يشعرُ فيها بالعزلةِ؛ لكنَّ نقطةَ التحولِ كانتْ حينَ قررَ تحدي المستحيلِ وحفظَ القرآنَ الكريمَ كاملاً في وقتٍ قياسيٍّ. التحقَ بالأزهرِ ثم سافرَ إلى فرنسا ليحصلَ على الدكتوراه؛ وعادَ ليصبحَ عميداً للأدبِ العربيِّ ووزيراً للمعارفِ؛ ليثبتَ أنَّ العمى هو عمى الفكرِ لا بصرِ العينِ.'],
            ['هيلين كيلر', '🌟', 'وُلدتْ هيلين طفلةً طبيعيةً؛ ولكن في سنِّ الثمانيةَ عشرَ شهراً؛ أصابتْها حمى شديدةٌ أفقدتْها السمعَ والبصرَ معاً؛ لتصبحَ سجينةً في عالمٍ صامتٍ ومظلمٍ تماماً. كانت طفلةً عنيفةً بسببِ إحباطِها؛ حتى جاءتْ نقطةُ التحولِ بلقاءِ معلمتِها آن سوليفان. وفي لحظةٍ تاريخيةٍ عندَ مضخةِ المياهِ؛ شعرتْ هيلين بالمياهِ تنسكبُ على يدِها بينما تكتبُ المعلمةُ كلمةَ ماءٍ على يدِها الأخرى؛ هنا أدركتْ هيلين فجأةً أنَّ لكلِّ شيءٍ اسماً؛ وانفتحَ أمامَها بابُ العلمِ لتصبحَ أعظمَ أديبةٍ كفيفةٍ وصماءَ في التاريخِ.'],
            ['لويس برايل', '📖', 'في سنِّ الثالثةِ؛ كان لويس يلعبُ بمخرزٍ حادٍّ في ورشةِ والدِهِ لصناعةِ الجلودِ؛ فانزلقَ المخرزُ ودخلَ في عينِهِ؛ ثم انتقلتِ العدوى للعينِ الأخرى ليفقدَ بصرَهُ تماماً. نقطةُ التحولِ جاءتْ وهو في المدرسةِ؛ حينَ شعرَ بالإحباطِ من الكتبِ الضخمةِ التي كانَ يصعبُ قراءتُها باللمسِ. استلهمَ فكرةً من شفرةٍ عسكريةٍ وطورَها وهو في سنِّ الخامسةِ عشرةَ إلى نظامِ النقاطِ البارزةِ. هذا الاختراعُ العظيمُ حولَ حياةَ الملايينِ من المكفوفينَ من التبعيةِ إلى الاستقلالِ والقدرةِ على القراءةِ والكتابةِ.'],
            ['عمار الشريعي', '🎹', 'وُلدَ عمار كفيفاً منذُ اللحظةِ الأولى؛ ولم يعرفْ شكلَ الضوءِ أبداً. في صغرِهِ كانَ يواجهُ صعوبةً في الاندماجِ؛ لكنَّ نقطةَ التحولِ كانتْ عندما اكتشفَ آلةَ البيانو؛ وجدَ أنَّ أصابعَهُ تستطيعُ رسمَ صورٍ خياليةٍ لا تراها عيناه. قررَ أن يتحدى إعاقتَهُ بدراسةِ الهندسةِ الصوتيةِ؛ وكان أولَ من طوعَ أجهزةَ الكمبيوترِ المعقدةَ لتتحدثَ إليهِ؛ ليصبحَ عبقريَّ الموسيقى الذي وضعَ ألحاناً خالدةً؛ وأثبتَ أنَّ الأذنَ قد ترى جمالَ الكونِ بوضوحٍ أكثرَ من العينِ.'],
            ['سيد مكاوي', '🎵', 'فقدَ سيد مكاوي بصرَهُ في طفولتِهِ نتيجةَ إصابتِهِ بالرمدِ؛ وبسببِ ضيقِ حالِ أسرتِهِ لم يُعالجْ بشكلٍ صحيحٍ. بدأ حياتَهُ منشداً في الموالدِ؛ لكنَّ نقطةَ التحولِ كانتْ حينَ قررَ مواجهةَ العالمِ بخفةِ ظلٍّ مصريةٍ أصيلةٍ وتخلى عن ثوبِ الحزنِ. صنعَ من صوتِهِ وعودِهِ عالماً خاصاً؛ وأصبحَ المسحراتي الذي ينتظرُهُ الملايينُ. أثبتَ سيد مكاوي أنَّ الإعاقةَ الحقيقيةَ هي فقدانُ الابتسامةِ؛ وأنَّ البصيرةَ هي التي تقودُ الإنسانَ نحو المجدِ.'],
            ['ستيفي وندر', '🎤', 'وُلدَ ستيفي قبلَ موعدِهِ؛ ونتيجةَ جرعةِ أكسجينٍ زائدةٍ في الحضانةِ؛ انفصلتِ الشبكيةُ وفقدَ بصرَهُ تماماً وهو رضيعٌ. عاشَ طفولةً صعبةً في حيٍّ فقيرٍ؛ لكنَّ نقطةَ التحولِ كانتْ عندما أهداهُ أحدُ الجيرانِ آلةَ هارمونيكا بسيطةً. وجدَ ستيفي في النغماتِ لغتَهُ الخاصةَ؛ ووقعَ عقداً احترافياً وهو في الحاديةِ عشرةَ من عمرِهِ. أصبحَ أيقونةً عالميةً؛ واستخدمَ شهرتَهُ ليدافعَ عن حقوقِ الإنسانِ؛ مؤكداً أنَّ العجزَ هو عجزُ الروحِ عن الحلمِ.']
        ];

        document.getElementById('l').innerHTML = data.map(h => `
            <div class="card" 
                 onclick="speakStory('${h[0]}', '${h[2]}')" 
                 onmouseenter="speak('${h[0]}')"
                 ontouchstart="speak('${h[0]}')">
                <div class="img-box">${h[1]}</div>
                <div class="info">
                    <h2>${h[0]}</h2>
                    <p>اضغط لسماع القصة كاملة..</p>
                </div>
            </div>`).join('');

        function speak(t) {
            window.speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(t);
            m.lang = 'ar-SA'; 
            m.rate = 1.1; 
            window.speechSynthesis.speak(m);
        }

function speakStory(name, story) {
            window.speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(name + " . " + story);
            m.lang = 'ar-SA'; 
            m.rate = 0.88; // سرعة هادئة للوضوح التام
            m.pitch = 1.0;
            window.speechSynthesis.speak(m);
        }

        function welcome() {
            setTimeout(() => {
                speak("أهلاً بكِ في صفحة ملهمون. مرري يدكِ لسماع الأسماء، أو اضغطي لسماع قصة كفاح كل بطل بالتفصيل.");
            }, 800);
        }
    </script>
</body>
</html>
